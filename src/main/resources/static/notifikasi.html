<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifikasi — EventHub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1a56db;--primary-dark:#1341b3;--primary-light:#ebf1fd;
  --sidebar-bg:#0f2044;--sidebar-hover:rgba(255,255,255,0.07);--sidebar-active:rgba(255,255,255,0.14);
  --white:#ffffff;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;
  --gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;
  --gray-700:#334155;--gray-800:#1e293b;
  --success:#10b981;--success-light:#d1fae5;
  --danger:#ef4444;--danger-light:#fee2e2;--warning:#f59e0b;
  --font:'Plus Jakarta Sans',sans-serif;
  --shadow-sm:0 1px 3px rgba(0,0,0,0.07);--shadow-md:0 4px 16px rgba(0,0,0,0.1);
  --radius-sm:6px;--radius:10px;--radius-lg:14px;--sidebar-w:220px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);display:flex;min-height:100vh;font-size:14px;}
button{cursor:pointer;font-family:var(--font);border:none;outline:none;}
a{text-decoration:none;}

/* ===== SIDEBAR ===== */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,0.07);}
.brand-icon{width:36px;height:36px;background:var(--primary);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(26,86,219,0.4);}
.brand-icon svg{width:20px;height:20px;fill:white;}
.brand-name{font-size:17px;font-weight:700;color:white;}
.sidebar-nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,0.6);font-size:13.5px;font-weight:500;cursor:pointer;transition:all 0.18s;text-decoration:none;}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,0.9);}
.nav-item.active{background:var(--sidebar-active);color:white;font-weight:600;}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.8;}
.nav-item.active svg{opacity:1;}
.sidebar-footer{padding:14px 10px;border-top:1px solid rgba(255,255,255,0.07);}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;border-radius:var(--radius-sm);}
.user-info:hover{background:var(--sidebar-hover);}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
.user-name{font-size:13px;font-weight:600;color:white;}
.user-role{font-size:11px;color:rgba(255,255,255,0.4);}

/* ===== MAIN ===== */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--white);border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:50;}
.topbar-left h1{font-size:18px;font-weight:700;}
.topbar-left p{font-size:13px;color:var(--gray-500);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.btn-mark-all{padding:8px 16px;background:var(--primary-light);color:var(--primary-dark);border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all 0.15s;}
.btn-mark-all:hover{background:var(--primary);color:white;}
.content{padding:24px 28px;flex:1;}

/* ===== FILTER BAR ===== */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.filter-btn{padding:7px 16px;border-radius:99px;font-size:12px;font-weight:600;border:1.5px solid var(--gray-200);background:var(--white);color:var(--gray-500);cursor:pointer;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.filter-btn:hover{border-color:var(--primary);color:var(--primary);}
.filter-btn.active{background:var(--primary);color:white;border-color:var(--primary);}
.filter-count{display:inline-flex;align-items:center;justify-content:center;border-radius:99px;min-width:18px;height:18px;font-size:10px;font-weight:700;padding:0 5px;background:rgba(255,255,255,0.25);}
.filter-btn:not(.active) .filter-count{background:var(--gray-200);color:var(--gray-600);}

/* ===== NOTIFIKASI LIST ===== */
.notif-list{display:flex;flex-direction:column;gap:10px;}
.notif-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px 20px;cursor:pointer;transition:all 0.18s;display:flex;gap:14px;align-items:flex-start;}
.notif-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.notif-card.unread{background:#f0f6ff;border-left:3px solid var(--primary);}
.notif-card.unread:hover{background:#e8f0fe;}
.notif-icon{width:42px;height:42px;border-radius:10px;background:var(--primary-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;}
.notif-body{flex:1;min-width:0;}
.notif-header-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;}
.notif-judul{font-size:14px;font-weight:700;color:var(--gray-800);line-height:1.3;}
.notif-card.unread .notif-judul{color:var(--primary-dark);}
.notif-time{font-size:11px;color:var(--gray-400);white-space:nowrap;flex-shrink:0;margin-top:2px;}
.notif-event-tag{display:inline-flex;align-items:center;gap:5px;background:var(--primary-light);color:var(--primary-dark);border-radius:99px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:8px;}
.notif-pesan{font-size:13px;color:var(--gray-600);line-height:1.6;}
.unread-dot{width:9px;height:9px;border-radius:50%;background:var(--primary);flex-shrink:0;margin-top:5px;}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:80px 20px;background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray-200);}
.empty-icon{font-size:52px;display:block;margin-bottom:16px;}
.empty-state h3{font-size:16px;font-weight:600;color:var(--gray-600);margin-bottom:6px;}
.empty-state p{font-size:13px;color:var(--gray-400);}

/* ===== SKELETON ===== */
.skel-card{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:18px 20px;display:flex;gap:14px;margin-bottom:10px;}
.skel-icon{width:42px;height:42px;border-radius:10px;flex-shrink:0;}
.skel-body{flex:1;}
.skel-line{height:12px;border-radius:4px;margin-bottom:10px;}
.skel-line.w-60{width:60%;}
.skel-line.w-40{width:40%;}
.skel-line.w-80{width:80%;}
.skel-line.w-full{width:100%;}
.skeleton{background:linear-gradient(90deg,var(--gray-100) 25%,var(--gray-200) 50%,var(--gray-100) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ===== TOAST ===== */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{display:flex;align-items:center;gap:10px;padding:12px 18px;background:var(--gray-800);color:white;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);animation:slideIn 0.3s ease;}
.toast.success{background:#065f46;}
.toast.error{background:#991b1b;}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.hidden{display:none!important;}

/* ===== DELETE BUTTONS ===== */
.notif-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:2px;}
.btn-hapus{background:none;border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:4px 10px;font-size:11px;font-weight:600;color:var(--gray-400);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.btn-hapus:hover{background:var(--danger-light);border-color:#fca5a5;color:var(--danger);}
.btn-hapus-semua{padding:8px 16px;background:var(--danger-light);color:var(--danger);border-radius:var(--radius-sm);font-size:12px;font-weight:600;border:1px solid #fca5a5;cursor:pointer;transition:all 0.15s;}
.btn-hapus-semua:hover{background:var(--danger);color:white;}
.konfirm-hapus{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:999;display:flex;align-items:center;justify-content:center;}
.konfirm-box{background:white;border-radius:var(--radius-lg);padding:28px 24px;max-width:360px;width:90%;text-align:center;box-shadow:var(--shadow-md);}
.konfirm-box h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.konfirm-box p{font-size:13px;color:var(--gray-500);margin-bottom:20px;}
.konfirm-btns{display:flex;gap:10px;justify-content:center;}
.konfirm-btns button{padding:9px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;}
.konfirm-batal{background:var(--gray-100);color:var(--gray-600);border:none;}
.konfirm-hapus-ok{background:var(--danger);color:white;border:none;}
</style>
</head>

<script>
// ===== AUTH =====
if (!localStorage.getItem('token')) { window.location.href = 'login.html'; }

var namaUser = localStorage.getItem('namaUser') || 'Pengguna';
var roleUser  = localStorage.getItem('roleUser') || 'peserta';
var idUser    = localStorage.getItem('idUser');

// Halaman ini hanya untuk peserta
if (roleUser === 'penyelenggara') { window.location.href = 'dashboard.html'; }

// Sidebar
document.getElementById('sidebarName').textContent   = namaUser;
document.getElementById('sidebarRole').textContent   = roleUser.charAt(0).toUpperCase() + roleUser.slice(1);
document.getElementById('sidebarAvatar').textContent = namaUser.charAt(0).toUpperCase();
document.getElementById('navLaporan').classList.add('hidden');
document.getElementById('navBroadcast').classList.add('hidden');

// ===== STATE =====
var semuaNotif  = [];
var filterAktif = 'semua';
// readIds: sinkron dengan dashboard via localStorage
var readIds = new Set(JSON.parse(localStorage.getItem('readNotifIds') || '[]'));

function saveReadIds() {
  localStorage.setItem('readNotifIds', JSON.stringify([...readIds]));
}

// ===== LOAD NOTIFIKASI =====
function loadNotifikasi() {
  fetch('/api/notifikasi/peserta/' + idUser)
    .then(function(r) {
      if (!r.ok) throw new Error('Gagal');
      return r.json();
    })
    .then(function(data) {
      var skelArea = document.getElementById('skeletonArea');
      if (skelArea) skelArea.remove();
      semuaNotif = Array.isArray(data) ? data : [];
      // Sinkronkan readIds dengan field sudahDibaca dari API
      semuaNotif.forEach(function(n) {
        if (n.sudahDibaca || n.dibaca || n.isRead) {
          readIds.add(String(n.id));
        }
      });
      saveReadIds();
      updateCounter();
      renderList();
    })
    .catch(function() {
      var skelArea = document.getElementById('skeletonArea');
      if (skelArea) skelArea.remove();
      document.getElementById('notifList').innerHTML =
        '<div class="empty-state">' +
          '<span class="empty-icon">&#x26A0;&#xFE0F;</span>' +
          '<h3>Gagal memuat notifikasi</h3>' +
          '<p>Periksa koneksi internet kamu dan coba lagi</p>' +
        '</div>';
    });
}

// ===== UPDATE COUNTER =====
function updateCounter() {
  var total = semuaNotif.length;
  var belum = semuaNotif.filter(function(n) { return !readIds.has(String(n.id)); }).length;
  var sudah = total - belum;

  document.getElementById('countSemua').textContent = total;
  document.getElementById('countBelum').textContent = belum;
  document.getElementById('countSudah').textContent = sudah;

  if (total === 0) {
    document.getElementById('subTitle').textContent = 'Semua notifikasi dari event yang kamu ikuti';
  } else if (belum > 0) {
    document.getElementById('subTitle').textContent = belum + ' belum dibaca dari ' + total + ' notifikasi';
  } else {
    document.getElementById('subTitle').textContent = 'Semua ' + total + ' notifikasi sudah dibaca';
  }
}

// ===== RENDER LIST =====
function renderList() {
  var list = document.getElementById('notifList');

  var data = semuaNotif.slice();
  if (filterAktif === 'belum') {
    data = semuaNotif.filter(function(n) { return !readIds.has(String(n.id)); });
  } else if (filterAktif === 'sudah') {
    data = semuaNotif.filter(function(n) { return readIds.has(String(n.id)); });
  }

  if (data.length === 0) {
    var info = {
      semua: { icon: '&#x1F514;', judul: 'Belum ada notifikasi', sub: 'Notifikasi broadcast dari penyelenggara akan muncul di sini' },
      belum: { icon: '&#x2705;',  judul: 'Semua sudah dibaca!',  sub: 'Tidak ada notifikasi yang belum dibaca' },
      sudah: { icon: '&#x1F4EC;', judul: 'Belum ada yang dibaca', sub: 'Klik notifikasi untuk menandainya sudah dibaca' }
    };
    var p = info[filterAktif];
    list.innerHTML =
      '<div class="empty-state">' +
        '<span class="empty-icon">' + p.icon + '</span>' +
        '<h3>' + p.judul + '</h3>' +
        '<p>' + p.sub + '</p>' +
      '</div>';
    return;
  }

  list.innerHTML = data.map(function(n) {
    var isRead = readIds.has(String(n.id));
    var waktu  = formatWaktu(n.dibuatAt || n.createdAt || n.waktu);
    return (
      '<div class="notif-card' + (isRead ? '' : ' unread') + '" id="notifCard-' + n.id + '">' +
        '<div class="notif-icon" onclick="tandaiDibaca(' + n.id + ')">&#x1F4E3;</div>' +
        '<div class="notif-body" onclick="tandaiDibaca(' + n.id + ')" style="cursor:pointer;">' +
          '<div class="notif-header-row">' +
            '<div class="notif-judul">' + esc(n.judul) + '</div>' +
            '<div class="notif-time">' + waktu + '</div>' +
          '</div>' +
          '<span class="notif-event-tag">&#x1F4C5; ' + esc(n.namaEvent || n.nama_event || '-') + '</span>' +
          '<div class="notif-pesan">' + esc(n.pesan || n.isi || '') + '</div>' +
        '</div>' +
        '<div class="notif-actions">' +
          (isRead ? '' : '<div class="unread-dot" id="dot-' + n.id + '"></div>') +
          '<button class="btn-hapus" onclick="hapusNotif(' + n.id + ', event)" title="Hapus notifikasi">&#x1F5D1;</button>' +
        '</div>' +
      '</div>'
    );
  }).join('');
}

// ===== SET FILTER =====
function setFilter(f) {
  filterAktif = f;
  ['Semua','Belum','Sudah'].forEach(function(id) {
    document.getElementById('btn' + id).classList.remove('active');
  });
  var map = { semua:'Semua', belum:'Belum', sudah:'Sudah' };
  document.getElementById('btn' + map[f]).classList.add('active');
  renderList();
}

// ===== TANDAI DIBACA =====
function tandaiDibaca(id) {
  if (readIds.has(String(id))) return;
  readIds.add(String(id));
  saveReadIds();

  // Tandai ke API juga
  fetch('/api/notifikasi/' + id + '/baca', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({userId: parseInt(idUser)}) }).catch(function(){});

  updateCounter();
  var card = document.getElementById('notifCard-' + id);
  if (card) {
    card.classList.remove('unread');
    var dot = document.getElementById('dot-' + id);
    if (dot) dot.remove();
  }
  if (filterAktif === 'belum') {
    setTimeout(function() { renderList(); }, 400);
  }
}

function tandaiSemuaDibaca() {
  if (semuaNotif.length === 0) { showToast('Tidak ada notifikasi', 'error'); return; }
  var belum = semuaNotif.filter(function(n) { return !readIds.has(String(n.id)); }).length;
  if (belum === 0) { showToast('Semua notifikasi sudah dibaca', 'error'); return; }
  semuaNotif.forEach(function(n) { readIds.add(String(n.id)); });
  saveReadIds();
  fetch('/api/notifikasi/baca-semua/' + idUser, { method: 'PUT' }).catch(function(){});
  updateCounter();
  renderList();
  showToast('&#x2705; Semua ' + semuaNotif.length + ' notifikasi ditandai dibaca', 'success');
}

// ===== HAPUS NOTIFIKASI =====
function hapusNotif(id, e) {
  if (e) e.stopPropagation();
  // Optimistic: langsung hapus dari DOM dan state
  semuaNotif = semuaNotif.filter(function(n) { return n.id !== id; });
  readIds.delete(String(id));
  saveReadIds();
  updateCounter();
  renderList();
  // Hit API
  fetch('/api/notifikasi/' + id + '?userId=' + idUser, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.success === false) {
        showToast('&#x26A0;&#xFE0F; Gagal menghapus notifikasi', 'error');
        loadNotifikasi(); // reload jika gagal
      } else {
        showToast('&#x1F5D1; Notifikasi dihapus', 'success');
      }
    })
    .catch(function() {
      showToast('&#x26A0;&#xFE0F; Gagal menghapus notifikasi', 'error');
      loadNotifikasi();
    });
}

function konfirmasiHapusSemua() {
  if (semuaNotif.length === 0) { showToast('Tidak ada notifikasi untuk dihapus', 'error'); return; }
  // Tampilkan modal konfirmasi
  var overlay = document.createElement('div');
  overlay.className = 'konfirm-hapus';
  overlay.id = 'konfirmOverlay';
  overlay.innerHTML =
    '<div class="konfirm-box">' +
      '<h3>&#x1F5D1; Hapus Semua Notifikasi?</h3>' +
      '<p>Semua ' + semuaNotif.length + ' notifikasi akan dihapus permanen dan tidak bisa dikembalikan.</p>' +
      '<div class="konfirm-btns">' +
        '<button class="konfirm-batal" onclick="tutupKonfirm()">Batal</button>' +
        '<button class="konfirm-hapus-ok" onclick="hapusSemua()">Ya, Hapus Semua</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
}

function tutupKonfirm() {
  var el = document.getElementById('konfirmOverlay');
  if (el) el.remove();
}

function hapusSemua() {
  tutupKonfirm();
  var total = semuaNotif.length;
  semuaNotif = [];
  readIds.clear();
  saveReadIds();
  updateCounter();
  renderList();
  fetch('/api/notifikasi/hapus-semua/' + idUser, { method: 'DELETE' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && data.success === false) {
        showToast('&#x26A0;&#xFE0F; Gagal menghapus', 'error');
        loadNotifikasi();
      } else {
        showToast('&#x1F5D1; ' + total + ' notifikasi dihapus', 'success');
      }
    })
    .catch(function() {
      showToast('&#x26A0;&#xFE0F; Gagal menghapus', 'error');
      loadNotifikasi();
    });
}

// ===== FORMAT WAKTU =====
function formatWaktu(raw) {
  if (!raw) return '';
  try {
    var d   = new Date(raw);
    var now = new Date();
    var ms  = now - d;
    var mnt = Math.floor(ms / 60000);
    var jam = Math.floor(mnt / 60);
    var hari= Math.floor(jam / 24);
    if (mnt < 1)  return 'Baru saja';
    if (mnt < 60) return mnt + ' menit lalu';
    if (jam < 24) return jam + ' jam lalu';
    if (hari < 7) return hari + ' hari lalu';
    return d.toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
  } catch(e) { return ''; }
}

// ===== HELPER =====
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function logout() {
  if (confirm('Keluar dari EventHub?')) {
    localStorage.clear();
    window.location.href = 'login.html';
  }
}

function showToast(msg, type) {
  type = type || 'info';
  var wrap = document.getElementById('toast-wrap');
  var t    = document.createElement('div');
  t.className  = 'toast ' + type;
  t.innerHTML  = msg;
  wrap.appendChild(t);
  setTimeout(function() {
    t.style.opacity    = '0';
    t.style.transition = 'opacity 0.3s';
    setTimeout(function() { t.remove(); }, 300);
  }, 3000);
}

// ===== INIT =====
loadNotifikasi();
</script>
